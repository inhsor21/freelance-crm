<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FreelanceCRM – Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="login-wrapper">
    <div class="login-blob1"></div>
    <div class="login-blob2"></div>

    <div class="login-card">
      <div class="login-tag">✦ admin login</div>
      <div class="login-title">freelance<em>CRM</em></div>
      <p class="login-sub">Sign in to manage your leads.</p>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Enter your password" />
      </div>

      <button class="login-btn" onclick="login()">Sign In →</button>
      <p class="error-msg" id="error-msg"></p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
